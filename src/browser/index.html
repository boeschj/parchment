<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>clawd-canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
    <!-- Theme override slot. main.tsx sets this href synchronously before the
         first render, based on the stored theme choice (see theme.ts):
         empty (default look), /theme.css (~/.parchment/theme.css, the custom
         override), or /themes/<name>.css (a built-in theme). Placed after the
         bundled stylesheet so its :root/.dark redefinitions win with no
         rebuild — the whole point of the theming contract. -->
    <link id="theme-override" rel="stylesheet" href="" />
  </body>
</html>
