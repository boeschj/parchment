<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>clawd-canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
    <!-- User theme override. The daemon serves ~/.canvas/theme.css here (empty
         if absent). Loaded last so a dev's :root token redefinitions win over
         theme-default.css with no rebuild. -->
    <link rel="stylesheet" href="/theme.css" />
  </body>
</html>
