<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><title>CI status dashboard</title></head>
<body style="font: 14px system-ui; margin: 24px;">
  <!-- The subtle failure this rubric exists to catch: everything a reader's eye
       skims for is here — headings, KPI text, axes, day labels, chart-shaped
       boxes — but not one data point was plotted. The old type-counting rubric
       scored artifacts like this as a pass. -->
  <h1>CI status dashboard</h1>
  <div><span>Build Pass Rate</span><strong>94%</strong></div>
  <div><span>Avg Build Time</span><strong>4m12s</strong></div>
  <div><span>Open Incidents</span><strong>2</strong></div>

  <h2>Build duration (minutes), last 7 days</h2>
  <svg width="360" height="200" role="img">
    <line x1="12" y1="160" x2="340" y2="160" stroke="#999" />
    <line x1="12" y1="20"  x2="12"  y2="160" stroke="#999" />
    <text x="24"  y="176" font-size="11">Mon</text>
    <text x="70"  y="176" font-size="11">Tue</text>
    <text x="116" y="176" font-size="11">Wed</text>
    <text x="162" y="176" font-size="11">Thu</text>
    <text x="208" y="176" font-size="11">Fri</text>
    <text x="254" y="176" font-size="11">Sat</text>
    <text x="300" y="176" font-size="11">Sun</text>
  </svg>

  <h2>Deploys per day, last 7 days</h2>
  <svg width="360" height="200" role="img">
    <line x1="12" y1="160" x2="340" y2="160" stroke="#999" />
    <line x1="12" y1="20"  x2="12"  y2="160" stroke="#999" />
    <text x="24"  y="176" font-size="11">Mon</text>
    <text x="70"  y="176" font-size="11">Tue</text>
    <text x="116" y="176" font-size="11">Wed</text>
    <text x="162" y="176" font-size="11">Thu</text>
    <text x="208" y="176" font-size="11">Fri</text>
    <text x="254" y="176" font-size="11">Sat</text>
    <text x="300" y="176" font-size="11">Sun</text>
  </svg>
</body>
</html>
