<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><title>Architecture</title></head>
<body style="font: 14px system-ui; margin: 24px;">
  <!-- All three nodes are labelled, but nothing connects them: a diagram of a
       system that draws no relationships is not a diagram of the system. -->
  <h1>Three-tier architecture</h1>
  <svg width="240" height="360" role="img">
    <rect x="40" y="20"  width="150" height="52" rx="6" fill="#eef" stroke="#88a" />
    <text x="90" y="52" font-size="14">Client</text>

    <rect x="40" y="150" width="150" height="52" rx="6" fill="#eef" stroke="#88a" />
    <text x="98" y="182" font-size="14">API</text>

    <rect x="40" y="280" width="150" height="52" rx="6" fill="#eef" stroke="#88a" />
    <text x="78" y="312" font-size="14">Database</text>
  </svg>
</body>
</html>
