<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><title>CI status dashboard</title>
<style>
  body { font: 14px system-ui; margin: 24px; }
  .kpis { display: flex; gap: 24px; margin-bottom: 24px; }
  .kpi { border: 1px solid #ddd; padding: 16px 24px; border-radius: 8px; }
  .kpi span { display: block; color: #666; font-size: 12px; text-transform: uppercase; }
  .kpi strong { font-size: 28px; }
</style>
</head>
<body>
  <h1>CI status dashboard</h1>
  <div class="kpis">
    <div class="kpi"><span>Build Pass Rate</span><strong>94%</strong></div>
    <div class="kpi"><span>Avg Build Time</span><strong>4m12s</strong></div>
    <div class="kpi"><span>Open Incidents</span><strong>2</strong></div>
  </div>

  <h2>Build duration (minutes), last 7 days</h2>
  <svg width="360" height="200" role="img">
    <rect x="20"  y="76"  width="28" height="84"  fill="#4a7" />
    <rect x="66"  y="104" width="28" height="56"  fill="#4a7" />
    <rect x="112" y="55"  width="28" height="105" fill="#4a7" />
    <rect x="158" y="97"  width="28" height="63"  fill="#4a7" />
    <rect x="204" y="20"  width="28" height="140" fill="#4a7" />
    <rect x="250" y="111" width="28" height="49"  fill="#4a7" />
    <rect x="296" y="83"  width="28" height="77"  fill="#4a7" />
    <line x1="12" y1="160" x2="340" y2="160" stroke="#999" />
    <text x="24"  y="176" font-size="11">Mon</text>
    <text x="70"  y="176" font-size="11">Tue</text>
    <text x="116" y="176" font-size="11">Wed</text>
    <text x="162" y="176" font-size="11">Thu</text>
    <text x="208" y="176" font-size="11">Fri</text>
    <text x="254" y="176" font-size="11">Sat</text>
    <text x="300" y="176" font-size="11">Sun</text>
  </svg>

  <h2>Deploys per day, last 7 days</h2>
  <svg width="360" height="200" role="img">
    <polyline points="34,118 80,90 126,132 172,76 218,104 264,62 310,118"
              fill="none" stroke="#37a" stroke-width="2" />
    <line x1="12" y1="160" x2="340" y2="160" stroke="#999" />
    <text x="24"  y="176" font-size="11">Mon</text>
    <text x="70"  y="176" font-size="11">Tue</text>
    <text x="116" y="176" font-size="11">Wed</text>
    <text x="162" y="176" font-size="11">Thu</text>
    <text x="208" y="176" font-size="11">Fri</text>
    <text x="254" y="176" font-size="11">Sat</text>
    <text x="300" y="176" font-size="11">Sun</text>
  </svg>
</body>
</html>
