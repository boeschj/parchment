<!doctype html>
<html lang="en">
<head><meta charset="utf-8" /><title>Sign up</title>
<style>
  body { font: 14px system-ui; margin: 24px; }
  label { display: block; margin: 12px 0; }
  input { display: block; padding: 8px; width: 260px; }
  button { margin-top: 16px; padding: 8px 20px; }
  form { min-height: 260px; }
</style>
</head>
<body>
  <!-- Every field is present with the right type, and the submit button reads
       "Sign up" — so the structural half of the rubric passes. But nothing
       validates: an empty name and a 3-character password sail straight
       through. Only the behavioural assertion catches this. -->
  <h1>Create your account</h1>
  <form onsubmit="event.preventDefault();">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" />
    <label for="email">Email</label>
    <input id="email" name="email" type="email" />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" />
    <button type="submit">Sign up</button>
  </form>
</body>
</html>
